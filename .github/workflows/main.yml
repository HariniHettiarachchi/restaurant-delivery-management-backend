name: CI for Delivery Service 

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout main repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Clone Kubernetes config repo (optional)
      - name: Clone Kubernetes Config Repository
        uses: actions/checkout@v3
        with:
          repository: 'Deliveroo-System/ds-project-kubernetes'
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          path: kubernetes

      # Step 3: Login to Docker Hub
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ✅ Step 4: Build Docker image (FIXED PATH)
      - name: Build Docker image
        run: |
          docker build \
          -f delivery-service/backend/Dockerfile \
          -t vidura12/deliveroo:delivery-service-latest \
          delivery-service/backend

      # Step 5: Push Docker image
      - name: Push Docker image
        run: docker push vidura12/deliveroo:delivery-service-latest
