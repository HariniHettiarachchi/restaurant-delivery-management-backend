name: CI/CD with DevSecOps for Delivery Service

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Step 3: Install dependencies
      - name: Install dependencies
        working-directory: delivery-service/backend
        run: npm install

      # Step 4: SonarCloud Scan (SAST)
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=HariniHettiarachchi_delivery-service
            -Dsonar.organization=harinihettiarachchi
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=delivery-service/backend

      # Step 5: Login to Docker Hub
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 6: Build Docker Image
      - name: Build Docker image
        run: |
          docker build \
          -f delivery-service/backend/Dockerfile \
          -t vidura12/deliveroo:delivery-service-latest \
          delivery-service/backend

      # Step 7: Push Docker Image
      - name: Push Docker image
        run: docker push vidura12/deliveroo:delivery-service-latest